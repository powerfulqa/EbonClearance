# StyLua formatter config for EbonClearance.
# Run:  stylua EbonClearance.lua
# Check:  stylua --check EbonClearance.lua
# Matches the existing 4-space indentation in EbonClearance.lua so adopting
# the formatter produces no re-indent churn.

column_width = 120
line_endings = "Unix"
indent_type = "Spaces"
indent_width = 4
quote_style = "AutoPreferDouble"
call_parentheses = "Always"
collapse_simple_statement = "Never"
