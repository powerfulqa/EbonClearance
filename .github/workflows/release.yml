name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Building version: $VERSION"
          sed -i "s/@VERSION@/$VERSION/g" EbonClearance.toc
          sed -i "s/@VERSION@/$VERSION/g" EbonClearance.lua

      - name: Package addon
        run: |
          mkdir -p EbonClearance
          cp EbonClearance.lua EbonClearance.toc LICENSE EbonClearance/
          zip -r EbonClearance.zip EbonClearance/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: EbonClearance.zip
          generate_release_notes: true
