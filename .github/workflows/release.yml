name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Building version: $VERSION"
          # Replace @VERSION@ placeholder or any previous vX.Y.Z version string
          sed -i "s/@VERSION@/$VERSION/g" EbonClearance.toc EbonClearance.lua
          sed -i "s/\[v[0-9]*\.[0-9]*\.[0-9]*\]/[$VERSION]/g" EbonClearance.toc
          sed -i "s/^## Version: .*/## Version: $VERSION/" EbonClearance.toc
          sed -i "s/EbonClearance v[0-9]*\.[0-9]*\.[0-9]*/EbonClearance $VERSION/g" EbonClearance.lua

      - name: Package addon
        run: |
          mkdir -p EbonClearance
          cp EbonClearance.lua EbonClearance.toc LICENSE EbonClearance/
          zip -r EbonClearance.zip EbonClearance/

      - name: Commit version update back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add EbonClearance.toc EbonClearance.lua
          git commit -m "Update version to ${GITHUB_REF_NAME} [skip ci]" || echo "No changes to commit"
          git push origin master

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: EbonClearance.zip
          generate_release_notes: true
