name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package addon
        run: |
          mkdir -p EbonClearance
          cp EbonClearance.lua EbonClearance.toc LICENSE EbonClearance/
          zip -r EbonClearance-${{ github.ref_name }}.zip EbonClearance/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: EbonClearance-${{ github.ref_name }}.zip
          generate_release_notes: true
