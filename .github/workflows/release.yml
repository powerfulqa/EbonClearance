name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Building version: $VERSION"
          # Replace @VERSION@ placeholder or any previous vX.Y.Z version string.
          sed -i "s/@VERSION@/$VERSION/g" EbonClearance.toc EbonClearance_Events.lua
          sed -i "s/\[v[0-9]*\.[0-9]*\.[0-9]*\]/[$VERSION]/g" EbonClearance.toc
          sed -i "s/^## Version: .*/## Version: $VERSION/" EbonClearance.toc
          # v2.13.2: anchor the lua sed to the canonical ADDON_VERSION
          # declaration. The previous pattern looked for the substring
          # "EbonClearance vX.Y.Z" which never appears in source (the
          # panel header is built by concatenation at runtime), so the
          # lua constant was silently stuck at whatever was last manually
          # bumped. The anchored pattern matches one specific line and
          # cannot accidentally rewrite an unrelated version-shaped string.
          sed -i "s/^local ADDON_VERSION = \"v[0-9]*\.[0-9]*\.[0-9]*\"/local ADDON_VERSION = \"$VERSION\"/" EbonClearance_Events.lua

      - name: Package addon
        run: |
          mkdir -p EbonClearance
          # v2.30.0+: the addon ships as a multi-file package after the
          # file-split refactor (see docs/CODE_REVIEW.md item 4). Every
          # EbonClearance_*.lua file listed in EbonClearance.toc must be
          # included or the addon fails to load. Add new split files to
          # this glob as future stages land.
          cp EbonClearance_Events.lua EbonClearance_Core.lua EbonClearance_Companion.lua \
             EbonClearance_Protection.lua EbonClearance_Vendor.lua \
             EbonClearance_Process.lua EbonClearance_ProcessBagsPanel.lua \
             EbonClearance_MerchantPanel.lua EbonClearance_ScavengerPanel.lua \
             EbonClearance_SellListPanels.lua \
             EbonClearance_KeepDeletePanels.lua EbonClearance_ProtectionPanel.lua \
             EbonClearance_ItemHighlightingPanel.lua EbonClearance_ProfilesPanel.lua \
             EbonClearance_MainPanel.lua EbonClearance_PanelInfra.lua \
             EbonClearance_PanelWidgets.lua EbonClearance_ListWidget.lua \
             EbonClearance_BagDisplay.lua \
             EbonClearance_BugReport.lua EbonClearance_Minimap.lua \
             EbonClearance_Tooltip.lua EbonClearance_BagContextMenu.lua \
             EbonClearance.toc Bindings.xml LICENSE EbonClearance/
          zip -r EbonClearance.zip EbonClearance/

      - name: Commit version update back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add EbonClearance.toc EbonClearance_Events.lua
          git commit -m "Update version to ${GITHUB_REF_NAME} [skip ci]" || echo "No changes to commit"
          git push origin master

      - name: Extract changelog section for this release
        # Pulls the `### vX.Y.Z` stanza from CHANGELOG.md and writes it to
        # release-body.md so the next step can pass it to the release.
        # Falls back to a small stub if the tag doesn't have a CHANGELOG
        # entry (e.g. a patch tag the maintainer didn't separately note);
        # softprops/action-gh-release@v3 will still append its own auto-
        # generated "Full Changelog" compare link via generate_release_notes.
        run: |
          VERSION="${GITHUB_REF_NAME}"
          awk -v target="### $VERSION" '
            $0 == target { found = 1; print; next }
            found && /^### v/ { found = 0 }
            found { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            printf "### %s\n\nPatch release. See the previous minor version for the feature description.\n" "$VERSION" > release-body.md
          fi
          echo "--- release-body.md (first 20 lines) ---"
          head -20 release-body.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: EbonClearance.zip
          body_path: release-body.md
          # generate_release_notes still appends the compare-link footer
          # ("**Full Changelog**: ...vPREV...vCUR") below the body_path
          # content, so the release page shows the curated changelog FIRST
          # and the auto-generated compare-link block below it.
          generate_release_notes: true
