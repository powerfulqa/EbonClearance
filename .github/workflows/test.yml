name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Lua 5.1
        # Retry: the apt mirror occasionally returns exit 100 (a transient
        # package-fetch failure) which has red-failed otherwise-green runs.
        # Up to 3 attempts; the final lua5.1 -v asserts the install actually
        # succeeded so a genuine failure still fails the step loudly.
        run: |
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y lua5.1 && break
            echo "apt attempt $i failed; retrying in 5s..." && sleep 5
          done
          lua5.1 -v

      - name: Lua syntax check
        # v2.30.0+: post file-split, every shipped source file is checked.
        # Add new EbonClearance_*.lua files to this list as future
        # split stages land.
        run: |
          luac5.1 -p EbonClearance_Events.lua
          luac5.1 -p EbonClearance_Comms.lua
          luac5.1 -p EbonClearance_GuildShare.lua
          luac5.1 -p EbonClearance_GuildPanel.lua
          luac5.1 -p EbonClearance_Core.lua
          luac5.1 -p EbonClearance_Locale.lua
          luac5.1 -p EbonClearance_Locale_frFR.lua
          luac5.1 -p EbonClearance_Locale_deDE.lua
          luac5.1 -p EbonClearance_Companion.lua
          luac5.1 -p EbonClearance_Protection.lua
          luac5.1 -p EbonClearance_Vendor.lua
          luac5.1 -p EbonClearance_Process.lua
          luac5.1 -p EbonClearance_ProcessBagsPanel.lua
          luac5.1 -p EbonClearance_MerchantPanel.lua
          luac5.1 -p EbonClearance_ScavengerPanel.lua
          luac5.1 -p EbonClearance_SellListPanels.lua
          luac5.1 -p EbonClearance_KeepDeletePanels.lua
          luac5.1 -p EbonClearance_ProtectionPanel.lua
          luac5.1 -p EbonClearance_ItemHighlightingPanel.lua
          luac5.1 -p EbonClearance_ProfilesPanel.lua
          luac5.1 -p EbonClearance_MainPanel.lua
          luac5.1 -p EbonClearance_PanelInfra.lua
          luac5.1 -p EbonClearance_PanelWidgets.lua
          luac5.1 -p EbonClearance_ListWidget.lua
          luac5.1 -p EbonClearance_BagDisplay.lua
          luac5.1 -p EbonClearance_BugReport.lua
          luac5.1 -p EbonClearance_Minimap.lua
          luac5.1 -p EbonClearance_Tooltip.lua
          luac5.1 -p EbonClearance_BagContextMenu.lua

      # NOTE: luacheck is intentionally NOT gated in CI yet. Enabling
      # `luacheck EbonClearance_*.lua` surfaced ~162 pre-existing warnings
      # (WoW API globals missing from .luacheckrc read_globals, plus a handful
      # of dead locals / unused args) that predate the localization work. The
      # gate is deferred until that debt is reconciled in a session with
      # luacheck installed locally - tracked in docs/CODE_REVIEW.md. Run
      # `luacheck *.lua` locally before committing in the meantime.

      - name: Invariant test suites
        # Single entry point; tests/run_all.lua is the source of truth for
        # the suite list. Add a new suite there and it runs here automatically.
        run: lua5.1 tests/run_all.lua
