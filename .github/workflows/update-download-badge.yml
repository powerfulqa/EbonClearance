name: Update download-count badge

on:
  release:
    types: [published]
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout badge-data branch
        uses: actions/checkout@v4
        with:
          ref: badge-data

      - name: Compute total downloads
        id: count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL=$(gh api "repos/${{ github.repository }}/releases" --paginate --jq '.[].assets[].download_count' | awk '{s+=$1} END {print s+0}')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Total downloads across all releases: $TOTAL"

      - name: Update JSON if changed
        env:
          TOTAL: ${{ steps.count.outputs.total }}
        run: |
          NEW="{\"schemaVersion\":1,\"label\":\"Downloads\",\"message\":\"$TOTAL\",\"color\":\"blue\"}"
          if [ -f downloads.json ] && [ "$(cat downloads.json)" = "$NEW" ]; then
            echo "No change ($TOTAL); skipping commit."
            exit 0
          fi
          echo "$NEW" > downloads.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads.json
          git commit -m "Update downloads count to $TOTAL"
          git push origin badge-data
